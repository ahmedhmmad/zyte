name: Deploy to Zyte Scrapy Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install shub
        run: pip install shub

      - name: Deploy to Zyte Cloud
        env:
          SHUB_APIKEY: ${{ secrets.SHUB_API_KEY }}
          ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}
        run: |
          shub deploy

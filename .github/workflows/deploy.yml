name: Deploy to Zyte Scrapy Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install shub
        run: pip install shub

      - name: Deploy to Zyte Cloud
        env:
          SHUB_APIKEY: ${{ secrets.SHUB_API_KEY }}
        run: |
          shub deploy

      - name: Set ZYTE_API_KEY via Zyte API
        env:
          ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}
          PROJECT_ID: 855780
        run: |
          curl -X POST "https://dash.zyte.com/api/projects/${PROJECT_ID}/envvar/" \
            -u "${SHUB_APIKEY}:" \
            -H "Content-Type: application/json" \
            -d '{"name": "ZYTE_API_KEY", "value": "'"${ZYTE_API_KEY}"'"}'
